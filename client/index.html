      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");

      if (!wrapperElement || !imageElement || !src) {
        if (wrapperElement) wrapperElement.classList.add("hidden");
        return;
      }

      wrapperElement.classList.remove("hidden");
      imageElement.src = src;
      if (alt) imageElement.alt = alt;
      imageElement.onerror = function () {

        slides.forEach(function (slide, index) {
          const distance = Math.abs(slide.offsetLeft - currentLeft);
          if (distance < nearestDistance) {
            nearestDistance = distance;
            nearestIndex = index;
          }
        });

        return nearestIndex;
      };

      const setActiveState = function (activeIndex) {
        dots.forEach(function (dot, index) {
          dot.classList.toggle("is-active", index === activeIndex);
        });
        const shouldHideControls = validImages.length <= 1;
        elements.featurePrev.classList.toggle("is-hidden", shouldHideControls);
        elements.featureNext.classList.toggle("is-hidden", shouldHideControls);
      };

      const updateFeatureState = function () {
        setActiveState(getActiveIndex());
      };

      const scrollToSlide = function (index, behavior) {
        if (!slides[index]) return;
        elements.featureGallery.scrollTo({
          left: slides[index].offsetLeft,
          behavior: behavior || "smooth"
        });
        setActiveState(index);
      };

      const scrollByDirection = function (direction) {
        const activeIndex = getActiveIndex();
        const targetIndex = (activeIndex + direction + validImages.length) % validImages.length;
        scrollToSlide(targetIndex, "smooth");
      };

      const startAutoScroll = function () {
        clearFeatureGalleryTimer();
        if (validImages.length <= 1) return;

        featureGalleryTimer = window.setInterval(function () {
          const activeIndex = getActiveIndex();
          const targetIndex = activeIndex >= validImages.length - 1 ? 0 : activeIndex + 1;
          scrollToSlide(targetIndex, "smooth");
        }, 3400);
      };

      elements.featureGallery.onscroll = updateFeatureState;
      elements.featureGallery.onmouseenter = clearFeatureGalleryTimer;
      elements.featureGallery.onmouseleave = startAutoScroll;
      elements.featureGallery.onpointerdown = clearFeatureGalleryTimer;
      elements.featureGallery.onpointerup = startAutoScroll;
      elements.featurePrev.onclick = function () {
        clearFeatureGalleryTimer();
        scrollByDirection(-1);
        startAutoScroll();
      };
      elements.featureNext.onclick = function () {
        clearFeatureGalleryTimer();
        scrollByDirection(1);
        startAutoScroll();
      };
      elements.featureDots.classList.toggle("hidden", validImages.length <= 1);
      scrollToSlide(0, "auto");
      startAutoScroll();
    }

    function setHeroMedia(videoSrc, bannerSrc, posterSrc = "") {
      setImage(elements.bannerImage, bannerSrc, "Kushal Diamonds banner");
      elements.heroVideo.setAttribute("poster", posterSrc || "");

      if (!videoSrc) {
        elements.heroVideo.classList.add("hidden");
        return;
      }

      elements.heroVideo.classList.remove("hidden");
      elements.heroVideoSource.src = videoSrc;
      elements.heroVideoSource.type = videoSrc.endsWith(".mp4") ? "video/mp4" : "video/webm";
      elements.heroVideo.load();

      const hideVideo = function () {
        elements.heroVideo.classList.add("hidden");
      };

      elements.heroVideo.addEventListener("error", hideVideo, { once: true });

      const playPromise = elements.heroVideo.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise.catch(hideVideo);
      }
    }

    function normalizeDigits(value) {
      return String(value || "").replace(/\D/g, "");
    }

    function joinPhone(countryCode, phoneNumber) {
      return [countryCode, phoneNumber].filter(Boolean).join(" ").trim();
    }

    function showStatus(message) {
      elements.statusMessage.textContent = message;
      elements.statusMessage.classList.remove("hidden");
    }

    function hideStatus() {
      elements.statusMessage.textContent = "";
      elements.statusMessage.classList.add("hidden");
    }

    function setMetaContent(selector, value) {
      const node = document.querySelector(selector);
      if (node && value) {
        node.setAttribute("content", value);
      }
    }

    function setLinkHref(selector, value) {
      const node = document.querySelector(selector);
      if (node && value) {
        node.setAttribute("href", value);
      }
    }

    function resolveUrl(value) {
      if (!value) return "";

      try {
        return new URL(value, window.location.href).href;
      } catch (error) {
        return value;
      }
    }

    function buildStructuredData(profile, canonicalUrl, imageUrl, thumbnailUrl) {
      const person = profile.person || {};
      const branding = profile.branding || {};
      const contact = profile.contact || {};
      const company = profile.company || {};
      const socials = company.socialLinks || {};
      const sameAs = [socials.youtube, socials.facebook, socials.instagram, socials.linkedin, contact.linkedin]
        .filter(Boolean);

      return {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            name: branding.companyName || "",
            url: canonicalUrl || company.websiteUrl || "",
            logo: thumbnailUrl || imageUrl || "",
            sameAs: sameAs
          },
          {
            "@type": "Person",
            name: person.name || "",
            image: thumbnailUrl || imageUrl || "",
            jobTitle: branding.designation || "",
            email: contact.email ? `mailto:${contact.email}` : "",
            telephone: joinPhone(contact.countryCode, contact.phoneNumber) || "",
            url: canonicalUrl || "",
            affiliation: {
              "@type": "Organization",
              name: branding.companyName || ""
            },
            sameAs: [contact.linkedin].filter(Boolean),
            address: company.addressLines && company.addressLines.length
              ? {
                  "@type": "PostalAddress",
                  streetAddress: company.addressLines[0] || "",
                  addressLocality: company.addressLines[1] || "",
                  addressCountry: company.addressLines[2] || ""
                }
              : undefined
          }
        ]
      };
    }

    function renderStructuredData(profile, canonicalUrl, imageUrl, thumbnailUrl) {
      if (!elements.structuredData) return;
      elements.structuredData.textContent = JSON.stringify(
        buildStructuredData(profile, canonicalUrl, imageUrl, thumbnailUrl),
        null,
        2
      );
    }

    function bindOptionalLink(element, url) {
      if (!element) return;

      if (url) {
        element.href = url;
        element.removeAttribute("aria-disabled");
        element.classList.remove("is-static");
        return;
      }

      element.href = "#";
      element.setAttribute("aria-disabled", "true");
      element.classList.add("is-static");
    }

    function buildVCard(profile) {
      const fullName = profile.person.name;
      const companyName = profile.branding.companyName;
      const role = profile.branding.designation;
      const email = profile.contact.email;
      const phone = normalizeDigits(joinPhone(profile.contact.countryCode, profile.contact.phoneNumber));
      const website = profile.company.websiteUrl || "";
      const address = (profile.company.addressLines || []).join(", ");

      return [
        "BEGIN:VCARD",
        "VERSION:3.0",
        `FN;CHARSET=UTF-8:${fullName}`,
        `N;CHARSET=UTF-8:;${fullName};;;`,
        `ORG;CHARSET=UTF-8:${companyName}`,
        `TITLE;CHARSET=UTF-8:${role}`,
        `TEL;TYPE=CELL:+${phone}`,
        `EMAIL;CHARSET=UTF-8;TYPE=WORK,INTERNET:${email}`,
        `ADR;CHARSET=UTF-8;TYPE=WORK:;;${address.replace(/,/g, "\\,")};;;;`,
        website ? `URL;TYPE=WORK;CHARSET=UTF-8:${website}` : "",
        `REV:${new Date().toISOString()}`,
        "END:VCARD"
      ].filter(Boolean).join("\n");
    }

    function downloadVCard() {
      if (!state.profile) return;

      const contactFile = state.profile.person && state.profile.person.contactFile;
      if (contactFile) {
        const anchor = document.createElement("a");
        anchor.href = contactFile;
        anchor.download = "";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        return;
      }

      const fileName = `${state.profile.person.name.replace(/\s+/g, "-")}.vcf`;
      const blob = new Blob([buildVCard(state.profile)], { type: "text/vcard;charset=utf-8" });
      const blobUrl = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = blobUrl;
      anchor.download = fileName;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(blobUrl);
    }

    async function shareProfile(mode) {
      if (!state.profile) return;

      const phoneLabel = joinPhone(state.profile.contact.countryCode, state.profile.contact.phoneNumber);
      const shareUrl = window.location.href;
      const shareTitle = `${state.profile.person.name} | ${state.profile.branding.companyName}`;
      const shareText = mode === "exchange"
        ? `${state.profile.person.name}\n${state.profile.branding.designation}\n${phoneLabel}\n${state.profile.contact.email}`
        : `${state.profile.person.name} | ${state.profile.branding.companyName}`;

      try {
        if (navigator.share) {
          await navigator.share({
            title: shareTitle,
            text: shareText,
            url: shareUrl
          });
          return;
        }

        if (navigator.clipboard) {
          await navigator.clipboard.writeText(`${shareText}\n${shareUrl}`);
          showStatus(mode === "exchange" ? "Contact details copied." : "Profile link copied.");
          return;
        }

        showStatus("Sharing is not available in this browser.");
      } catch (error) {
        if (error && error.name !== "AbortError") {
          showStatus("Unable to share right now.");
        }
      }
    }

    async function configureBrochureLink(pdfPath) {
      const brochureLinks = [elements.brochureLink].filter(Boolean);

      if (!pdfPath) {
        brochureLinks.forEach(function (link) {
          link.classList.add("is-disabled");
          link.removeAttribute("href");
          link.removeAttribute("download");
        });
        return;
      }

      brochureLinks.forEach(function (link) {
        link.href = pdfPath;
        link.setAttribute("download", "");
        link.classList.remove("is-disabled");
      });

      if (!window.location.protocol.startsWith("http")) {
        return;
      }

      try {
        const response = await fetch(pdfPath, { method: "HEAD", cache: "no-store" });
        if (!response.ok) {
          throw new Error("Missing PDF");
        }
      } catch (error) {
        brochureLinks.forEach(function (link) {
          link.classList.add("is-disabled");
          link.removeAttribute("href");
          link.removeAttribute("download");
        });
      }
    }

    function renderProfile(profile) {
      state.profile = profile;
      hideStatus();

      const meta = profile.meta || {};
      const branding = profile.branding || {};
      const person = profile.person || {};
      const contact = profile.contact || {};
      const company = profile.company || {};
      const assets = profile.assets || {};
      const shareImage = assets.sharePreview || assets.thumbnail || assets.heroVideoPoster || person.profilePhoto || "";
      const resolvedShareImage = resolveUrl(shareImage);
      const resolvedThumbnail = resolveUrl(assets.thumbnail || person.profilePhoto || shareImage);
      const canonicalUrl = meta.siteUrl
        ? resolveUrl(meta.siteUrl)
        : window.location.protocol.startsWith("http")
          ? window.location.href
          : resolveUrl(company.websiteUrl || "");
      const imageAlt = person.name
        ? `${person.name} profile preview`
        : `${branding.companyName || "Kushal Diamonds"} profile preview`;

      document.title = meta.title || document.title;
      const metaDescription = document.querySelector('meta[name="description"]');
      if (metaDescription && meta.description) {
        metaDescription.setAttribute("content", meta.description);
      }
      setMetaContent('meta[property="og:site_name"]', branding.companyName || "Kushal Diamonds");
      setMetaContent('meta[property="og:title"]', meta.title || document.title);
      setMetaContent('meta[property="og:description"]', meta.description || "");
      setMetaContent('meta[property="og:url"]', canonicalUrl);
      setMetaContent('meta[property="og:image:url"]', resolvedShareImage);
      setMetaContent('meta[property="og:image:secure_url"]', resolvedShareImage);
      setMetaContent('meta[name="twitter:title"]', meta.title || document.title);
      setMetaContent('meta[name="twitter:description"]', meta.description || "");
      setMetaContent('meta[name="twitter:url"]', canonicalUrl);
      setMetaContent('meta[property="og:image"]', resolvedShareImage);
      setMetaContent('meta[property="og:image:alt"]', imageAlt);
      setMetaContent('meta[name="twitter:image"]', resolvedShareImage);
      setMetaContent('meta[name="twitter:image:alt"]', imageAlt);
      setMetaContent('meta[itemprop="image"]', resolvedThumbnail || resolvedShareImage);
      setLinkHref('#canonicalLink', canonicalUrl);
      setLinkHref('link[rel="image_src"]', resolvedShareImage);
      setLinkHref('#faviconSvgLink', assets.favicon || "./assets/favicon.svg");
      setLinkHref('#shortcutIconLink', assets.thumbnail || person.profilePhoto || shareImage || "");
      setLinkHref('#faviconPngLink', assets.thumbnail || person.profilePhoto || shareImage || "");
      setLinkHref('#appleTouchIconLink', assets.thumbnail || person.profilePhoto || shareImage || "");

      if (assets.background) {
        document.documentElement.style.setProperty("--page-bg-image", `url("${assets.background}")`);
      }

      setHeroMedia(assets.heroVideo, assets.banner, assets.heroVideoPoster || assets.thumbnail || person.profilePhoto || "");
      renderHeroBrand(branding, assets);
      setImage(elements.profilePhoto, person.profilePhoto || assets.thumbnail, person.name || "Profile photo");
      setImage(elements.phoneIcon, assets.phoneIcon, "Phone icon");
      setImage(elements.emailIcon, assets.emailIcon, "Email icon");
      setImage(elements.linkedinIcon, assets.linkedinIcon, "LinkedIn icon");
      setImage(elements.whatsappIcon, assets.whatsappIcon, "WhatsApp icon");
      setImage(elements.exchangeImage, assets.exchangeButton, "Exchange contact");
      setImage(elements.mobileExchangeImage, assets.exchangeButton, "Exchange contact");
      setImage(elements.saveImage, assets.saveButton, "Save to contacts");
      setImage(elements.mobileSaveImage, assets.saveButton, "Add to contacts");
      setImage(elements.shareIcon, assets.shareIcon, "Share");
      setImage(elements.mobileShareIcon, assets.shareIcon, "Share");
      const hasTrustArtwork = Boolean(assets.trustBadge);
      elements.trustSection.classList.toggle("has-trust-art", hasTrustArtwork);
      setOptionalImage(elements.trustBadgeWrap, elements.trustBadge, assets.trustBadge, "We stud trust along with diamonds");
      renderFeatureGallery(assets.productGallery && assets.productGallery.length ? assets.productGallery : [assets.featureImage]);
      setImage(elements.serviceBlockImage, assets.serviceBlock, "Diamond services");
      setImage(elements.brochureButton, assets.downloadBrochureButton, branding.brochureLabel || "Download brochure");
      setImage(elements.addressIcon, assets.addressIcon, "Location");
      setImage(elements.websiteIcon, assets.websiteIcon, "Website");
      setImage(elements.youtubeIcon, assets.youtubeIcon, "YouTube");
      setImage(elements.facebookIcon, assets.facebookIcon, "Facebook");
      setImage(elements.instagramIcon, assets.instagramIcon, "Instagram");
      setImage(elements.companyLinkedinIcon, assets.companyLinkedinIcon, "LinkedIn");
      setImage(elements.poweredByImage, assets.poweredBy, "Powered by GoodUX");

      elements.personName.textContent = person.name || "";
      elements.personRole.textContent = branding.designation || "";
      elements.tagline.innerHTML = String(branding.tagline || "")
        .split("\n")
        .map((line) => escapeHtml(line.trim()))
        .filter(Boolean)
        .join("<br>");
      elements.trustTop.textContent = hasTrustArtwork ? "" : branding.trustHeadingTop || "";
      elements.trustBottom.textContent = hasTrustArtwork ? "" : branding.trustHeadingBottom || "";
      elements.aboutTitle.textContent = branding.aboutTitle || "";
      elements.aboutDescription.innerHTML = branding.aboutDescriptionHtml || "";

      const phoneLabel = joinPhone(contact.countryCode, contact.phoneNumber);
      const phoneDigits = normalizeDigits(phoneLabel);
      const phoneHref = phoneDigits ? `tel:+${phoneDigits}` : "#";
      const emailHref = contact.email ? `mailto:${contact.email}` : "#";
      const whatsappDigits = normalizeDigits(contact.whatsappNumber || phoneLabel);
      const whatsappHref = whatsappDigits ? `https://wa.me/${whatsappDigits}` : "";

      elements.phoneText.textContent = phoneLabel;
      elements.emailText.textContent = contact.email || "";
      elements.phoneLink.href = phoneHref;
      elements.emailLink.href = emailHref;
      elements.phoneLinkSecondary.href = phoneHref;
      elements.emailLinkSecondary.href = emailHref;
      elements.phoneLinkSecondary.textContent = phoneLabel;
      elements.emailLinkSecondary.textContent = contact.email || "";
      elements.addressText.textContent = (company.addressLines || []).join("\n");
      elements.websiteText.innerHTML = (company.websiteLabel || "").replace("kushaldiamonds", "<strong>kushaldiamonds</strong>");
      elements.websiteLink.href = company.websiteUrl || "#";

      bindOptionalLink(elements.linkedinLink, contact.linkedin || "");
      bindOptionalLink(elements.whatsappLink, whatsappHref);

      const socials = company.socialLinks || {};
      bindOptionalLink(elements.youtubeLink, socials.youtube || "");
      bindOptionalLink(elements.facebookLink, socials.facebook || "");
      bindOptionalLink(elements.instagramLink, socials.instagram || "");
      bindOptionalLink(elements.companyLinkedinLink, socials.linkedin || contact.linkedin || "");
      bindOptionalLink(elements.poweredByLink, company.poweredByUrl || "https://goodux.in/");

      configureBrochureLink(company.profilePdf);
      renderStructuredData(profile, canonicalUrl, resolvedShareImage, resolvedThumbnail);

      elements.loadingState.classList.add("hidden");
      elements.contentState.classList.remove("hidden");
      elements.mobileStickyBar.classList.remove("hidden");
    }

    function readEmbeddedProfile() {
      const node = document.getElementById("profileData");
      if (!node) {
        throw new Error("Missing embedded profile data.");
      }

      return JSON.parse(node.textContent);
    }

    function loadProfile() {
      try {
        const profile = readEmbeddedProfile();
        renderProfile(profile);
      } catch (error) {
        elements.loadingState.classList.add("hidden");
        showStatus("Unable to load the embedded profile data.");
        console.error(error);
      }
    }

    elements.saveContactAction.addEventListener("click", downloadVCard);
    elements.mobileExchangeAction.addEventListener("click", function () {
      shareProfile("exchange");
    });
    elements.mobileSaveContactAction.addEventListener("click", downloadVCard);
    elements.shareAction.addEventListener("click", function () {
      shareProfile("share");
    });
    elements.mobileShareAction.addEventListener("click", function () {
      shareProfile("share");
    });
    elements.exchangeAction.addEventListener("click", function () {
      shareProfile("exchange");
    });

    loadProfile();
  </script>
</body>
</html>
